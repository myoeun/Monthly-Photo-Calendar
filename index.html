<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포토 캘린더 메이커</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #faf8f5;
            --accent-color: #7d7565;
            --text-main: #333333;
            --border-light: #e5e5e5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 24px;
            font-weight: 500;
            color: var(--accent-color);
            margin-bottom: 8px;
        }

        header p {
            font-size: 14px;
            color: #8c8c8c;
        }

        .controls {
            margin-bottom: 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .select-box {
            padding: 10px 16px;
            border-radius: 20px;
            border: 1px solid var(--border-light);
            background-color: #ffffff;
            font-size: 14px;
            color: var(--text-main);
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s ease;
        }

        .select-box:focus {
            border-color: var(--accent-color);
        }

        .btn {
            background-color: #ffffff;
            border: 1px solid var(--border-light);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            border-color: var(--accent-color);
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: #ffffff;
            border-color: var(--accent-color);
        }

        .calendar-wrapper {
            width: 390px;
            height: 600px;
            background-color: #e2dfd2; 
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .calendar-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            filter: brightness(0.85);
        }

        .calendar-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background: rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            padding: 40px 24px;
            color: #ffffff;
        }

        .calendar-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .calendar-header .title {
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 4px;
            outline: none;
            text-transform: lowercase;
        }

        .weekdays-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 16px;
            opacity: 0.8;
            font-size: 12px;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            row-gap: 16px;
            column-gap: 10px;
        }

        .day-cell {
            position: relative;
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.4);
            /* 정렬 로직 수정: 플러스 아이콘과 숫자가 공존하므로 flex를 유지하되 내부 여백 세조정 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            cursor: pointer;
            background-size: cover;
            background-position: center;
            transition: all 0.2s ease;
            overflow: hidden;
        }

        /* [수정 핵심] 날짜 숫자가 시각적 정중앙에 치우치지 않게 배치 */
        .day-cell .day-num {
            font-weight: 500; /* 조금 더 선명하게 */
            display: block;
            color: #ffffff;
            /* 중요: 서체 특성으로 인한 치우침 방지를 위해 line-height를 1로 고정 */
            line-height: 1;
            /* Grid 정렬 엔진을 사용하여 CSS 내부적으로 수학적인 정중앙을 맞춤 */
            display: grid;
            place-items: center;
            text-align: center;
        }

        .day-cell .plus-icon {
            font-size: 9px; /* 조금 더 작게 */
            opacity: 0.5;
            /* 숫자 바로 밑에 오도록 여백 세조정 */
            margin-top: 2px; 
            font-weight: 300;
            display: block;
            line-height: 1;
        }

        .day-cell:hover {
            border-color: #ffffff;
            background-color: rgba(255, 255, 255, 0.1);
        }

        .day-cell.empty {
            border: none;
            cursor: default;
        }

        .day-cell.has-image {
            border: 1px solid rgba(255, 255, 255, 0.8);
        }
        
        .day-cell.has-image .plus-icon {
            display: none !important;
        }
        
        /* 사진이 있어도 숫자는 중앙에 유지 */
        .day-cell.has-image .day-num {
            display: block !important;
        }

        .day-cell.has-image:hover {
            background-blend-mode: overlay;
            background-color: rgba(0, 0, 0, 0.3);
        }

        /* [수정] 내보내기 캡처 스타일: 저장된 결과물에서도 숫자 중앙 정렬 유지 */
        .is-exporting {
            background-color: transparent !important;
            background-image: none !important;
            box-shadow: none !important;
        }
        .is-exporting .calendar-bg {
            display: none !important;
        }
        .is-exporting .calendar-content {
            background: transparent !important;
        }
        
        /* 중요: 저장할 땐 모든 플러스 기호 제거 */
        .is-exporting .day-cell .plus-icon {
            display: none !important;
        }

        /* [수정 핵심] 사진 있든 없든 모든 원과 숫자를 정중앙에 고정 */
        .is-exporting .day-cell:not(.empty) {
            border: 1px solid rgba(255, 255, 255, 1.0) !important;
            /* 캡처 시에도 Grid 정렬 엔진으로 정중앙 유지 */
            display: grid !important;
            place-items: center !important;
        }
        
        .is-exporting .day-cell:not(.empty) .day-num {
            display: grid !important;
            place-items: center !important;
            color: #ffffff !important;
            line-height: 1 !important;
            /* 캡처할 땐 하단 여백 제거하여 완벽한 중앙 맞춤 */
            margin: 0 !important;
        }

        #bg-input, #file-input {
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>Monthly Photo Calendar</h1>
        <p>사진으로 기록하는 나의 루틴</p>
        <p>타이틀을 클릭해서 직접 수정해보세요!</p>
    </header>

    <div class="controls">
        <select id="year-select" class="select-box"></select>
        <select id="month-select" class="select-box"></select>

        <label for="bg-input" class="btn"> 배경 사진 삽입</label>
        <input type="file" id="bg-input" accept="image/*">
        
        <button class="btn btn-primary" id="download-btn"> PNG로 저장</button>
        <button class="btn" id="clear-btn" style="color: #d9534f;">🔄 현재 달 초기화</button>
    </div>

    <input type="file" id="file-input" accept="image/*">

    <div class="calendar-wrapper" id="calendar-area">
        <img class="calendar-bg" id="calendar-bg-img" src="">
        
        <div class="calendar-content">
            <div class="calendar-header">
                <div class="title" id="calendar-title" contenteditable="true">june dump</div>
            </div>

            <div class="weekdays-grid">
                <div>mon</div><div>tue</div><div>wed</div><div>thu</div><div>fri</div><div>sat</div><div>sun</div>
            </div>

            <div class="days-grid" id="days-container"></div>
        </div>
    </div>

    <script>
        const daysContainer = document.getElementById('days-container');
        const fileInput = document.getElementById('file-input');
        const bgInput = document.getElementById('bg-input');
        const bgImg = document.getElementById('calendar-bg-img');
        const downloadBtn = document.getElementById('download-btn');
        const clearBtn = document.getElementById('clear-btn');
        const calendarArea = document.getElementById('calendar-area');
        
        const yearSelect = document.getElementById('year-select');
        const monthSelect = document.getElementById('month-select');
        const calendarTitle = document.getElementById('calendar-title');

        let activeDayIndex = null;
        let allSavedPhotos = {};
        let currentYear = 2026;
        let currentMonth = 6; 

        const STORAGE_KEY_PHOTOS_DB = 'photo_calendar_db_v9_centered';
        const STORAGE_KEY_BG = 'photo_calendar_bg_v9_centered';

        const monthNames = [
            "january", "february", "march", "april", "may", "june",
            "july", "august", "september", "october", "november", "december"
        ];

        function initSelectOptions() {
            for (let y = 2025; y <= 2030; y++) {
                const opt = document.createElement('option');
                opt.value = y;
                opt.innerText = `${y}년`;
                if (y === currentYear) opt.selected = true;
                yearSelect.appendChild(opt);
            }

            for (let m = 1; m <= 12; m++) {
                const opt = document.createElement('option');
                opt.value = m;
                opt.innerText = `${m}월`;
                if (m === currentMonth) opt.selected = true;
                monthSelect.appendChild(opt);
            }

            yearSelect.addEventListener('change', (e) => {
                currentYear = parseInt(e.target.value);
                updateCalendarView();
            });

            monthSelect.addEventListener('change', (e) => {
                currentMonth = parseInt(e.target.value);
                updateCalendarView();
            });
        }

        function initCalendar() {
            initSelectOptions();

            const localDB = localStorage.getItem(STORAGE_KEY_PHOTOS_DB);
            if (localDB) allSavedPhotos = JSON.parse(localDB);

            const localBg = localStorage.getItem(STORAGE_KEY_BG);
            if (localBg) bgImg.src = localBg;

            updateCalendarView();
        }

        function updateCalendarView() {
            calendarTitle.innerText = `${monthNames[currentMonth - 1]} dump`;

            const firstDayObj = new Date(currentYear, currentMonth - 1, 1);
            let startDayOfWeek = firstDayObj.getDay(); 
            startDayOfWeek = startDayOfWeek === 0 ? 6 : startDayOfWeek - 1;

            const totalDays = new Date(currentYear, currentMonth, 0).getDate();

            renderGrid(startDayOfWeek, totalDays);
        }

        function renderGrid(emptyCount, totalDays) {
            daysContainer.innerHTML = '';
            const currentKey = `${currentYear}-${String(currentMonth).padStart(2, '0')}`;
            const currentMonthPhotos = allSavedPhotos[currentKey] || {};

            for (let i = 0; i < emptyCount; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'day-cell empty';
                daysContainer.appendChild(emptyCell);
            }

            for (let day = 1; day <= totalDays; day++) {
                const dayCell = document.createElement('div');
                dayCell.className = 'day-cell';
                
                const dayNum = document.createElement('span');
                dayNum.className = 'day-num';
                dayNum.innerText = day;
                dayCell.appendChild(dayNum);

                const plusIcon = document.createElement('span');
                plusIcon.className = 'plus-icon';
                plusIcon.innerText = '+';
                dayCell.appendChild(plusIcon);

                if (currentMonthPhotos[day]) {
                    dayCell.style.backgroundImage = `url(${currentMonthPhotos[day]})`;
                    dayCell.classList.add('has-image');
                }

                dayCell.addEventListener('click', () => {
                    activeDayIndex = day;
                    fileInput.click();
                });

                daysContainer.appendChild(dayCell);
            }
        }

        function resizeAndCompressImage(file, callback) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 150;
                    const MAX_HEIGHT = 150;
                    
                    canvas.width = MAX_WIDTH;
                    canvas.height = MAX_HEIGHT;
                    const ctx = canvas.getContext('2d');
                    
                    const scale = Math.max(MAX_WIDTH / img.width, MAX_HEIGHT / img.height);
                    const x = (MAX_WIDTH - img.width * scale) / 2;
                    const y = (MAX_HEIGHT - img.height * scale) / 2;
                    
                    ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    callback(dataUrl);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function resizeBackground(file, callback) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = 400;
                    canvas.height = 650;
                    const ctx = canvas.getContext('2d');
                    
                    const scale = Math.max(canvas.width / img.width, canvas.height / img.height);
                    const x = (canvas.width - img.width * scale) / 2;
                    const y = (canvas.height - img.height * scale) / 2;
                    
                    ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
                    callback(dataUrl);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file || activeDayIndex === null) return;

            resizeAndCompressImage(file, function(compressedBase64) {
                const currentKey = `${currentYear}-${String(currentMonth).padStart(2, '0')}`;
                if (!allSavedPhotos[currentKey]) allSavedPhotos[currentKey] = {};
                
                allSavedPhotos[currentKey][activeDayIndex] = compressedBase64;
                
                try {
                    localStorage.setItem(STORAGE_KEY_PHOTOS_DB, JSON.stringify(allSavedPhotos));
                } catch (error) {
                    alert('저장 공간 용량이 초과되었습니다.');
                }
                updateCalendarView();
            });
            e.target.value = '';
        });

        bgInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            resizeBackground(file, function(compressedBg) {
                bgImg.src = compressedBg;
                try {
                    localStorage.setItem(STORAGE_KEY_BG, compressedBg);
                } catch (error) {
                    alert('배경 이미지 용량이 초과되었습니다.');
                }
            });
        });

        downloadBtn.addEventListener('click', () => {
            const currentKey = `${currentYear}-${String(currentMonth).padStart(2, '0')}`;
            downloadBtn.innerText = '📸 저장 중...';
            
            calendarArea.classList.add('is-exporting');

            setTimeout(() => {
                html2canvas(calendarArea, {
                    useCORS: true,
                    scale: 2,
                    backgroundColor: null
                }).then(canvas => {
                    const imageURI = canvas.toDataURL('image/png');
                    
                    const link = document.createElement('a');
                    link.href = imageURI;
                    link.download = `photo-calendar-${currentKey}.png`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);

                    calendarArea.classList.remove('is-exporting');
                    downloadBtn.innerText = '💾 배경 투명 PNG로 저장';
                }).catch(err => {
                    console.error(err);
                    calendarArea.classList.remove('is-exporting');
                    downloadBtn.innerText = '💾 배경 투명 PNG로 저장';
                });
            }, 100);
        });

        clearBtn.addEventListener('click', () => {
            const currentKey = `${currentYear}-${String(currentMonth).padStart(2, '0')}`;
            if (confirm(`${currentYear}년 ${currentMonth}월의 사진 기록을 모두 삭제할까요?`)) {
                if (allSavedPhotos[currentKey]) {
                    delete allSavedPhotos[currentKey];
                    localStorage.setItem(STORAGE_KEY_PHOTOS_DB, JSON.stringify(allSavedPhotos));
                }
                updateCalendarView();
            }
        });

        window.onload = initCalendar;
    </script>
</body>
</html>
